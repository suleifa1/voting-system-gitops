# Development environment values
# Override default values for dev environment

global:
  namespace: dev

backend:
  replicaCount: 1  # Single replica for dev
  
  image:
    tag: dev-8f20f92
    pullPolicy: Always
  
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

frontend:
  replicaCount: 1  # Single replica for dev
  
  image:
    tag: dev-a0d8a28
    pullPolicy: Always
  
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  
  env:
    NODE_ENV: "development"
    NEXT_PUBLIC_API_URL: "/dev/api"

cockroachdb:
  replicaCount: 1
  
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  
  persistence:
    size: 2Gi

ingress:
  enabled: false

istio:
  enabled: true
  hosts:
  - backend
  - frontend

secret:
  SECRET_KEY: "dev-secret-key-not-for-production"
