# Development environment values
# Override default values for dev environment

global:
  namespace: dev

backend:
  replicaCount: 1  # Single replica for dev
  
  image:
    tag: dev-3b2ee02
    pullPolicy: Always
  
  resources:
    requests:
      memory: "100Mi"
      cpu: "50m"
    limits:
      memory: "200Mi"
      cpu: "50m"

frontend:
  replicaCount: 1  # Single replica for dev
  
  image:
    tag: dev-43fdfc0
    pullPolicy: Always
  
  resources:
    requests:
      memory: "100Mi"
      cpu: "20m"
    limits:
      memory: "200Mi"
      cpu: "50m"

  livenessProbe:
    enabled: true
    path: /dev/
    initialDelaySeconds: 30
    periodSeconds: 10
  
  readinessProbe:
    enabled: true
    path: /dev/
    initialDelaySeconds: 10
    periodSeconds: 5
  
  env:
    NODE_ENV: "development"

cockroachdb:
  enabled: false  # Moved to separate cockroachdb chart in namespace database

# Istio ServiceEntry - resolves CockroachDB from namespace database
serviceEntry:
  database:
    enabled: true
    host: "database"
    port: 26257
    address: cockroachdb.database.svc.cluster.local

# initDbJob and migrateJob moved to cockroachdb ArgoCD app
initDbJob:
  enabled: false

migrateJob:
  enabled: false

ingress:
  enabled: false

istio:
  enabled: true
  hosts:
  - backend
  - frontend

secret:
  SECRET_KEY: "dev-secret-key-not-for-production"
  DB_USER: "app_dev"
  DB_PASSWORD: "dev-db-password-change-me"  # должен совпадать с cockroachdb chart schemas[dev].password
