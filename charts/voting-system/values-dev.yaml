# Development environment values
# Override default values for dev environment

global:
  namespace: dev

backend:
  replicaCount: 1  # Single replica for dev
  
  image:
    tag: dev-8f20f92
    pullPolicy: Always
  
  resources:
    requests:
      memory: "100Mi"
      cpu: "50m"
    limits:
      memory: "200Mi"
      cpu: "50m"

frontend:
  replicaCount: 1  # Single replica for dev
  
  image:
    tag: dev-43fdfc0
    pullPolicy: Always
  
  resources:
    requests:
      memory: "100Mi"
      cpu: "20m"
    limits:
      memory: "200Mi"
      cpu: "50m"

  livenessProbe:
    enabled: true
    path: /dev/
    initialDelaySeconds: 30
    periodSeconds: 10
  
  readinessProbe:
    enabled: true
    path: /dev/
    initialDelaySeconds: 10
    periodSeconds: 5
  
  env:
    NODE_ENV: "development"

cockroachdb:
  replicaCount: 1
  
  resources:
    requests:
      memory: "512Mi"
      cpu: "50m"
    limits:
      memory: "800Mi"
      cpu: "50m"
  
  persistence:
    size: 2Gi

ingress:
  enabled: false

istio:
  enabled: true
  hosts:
  - backend
  - frontend

secret:
  SECRET_KEY: "dev-secret-key-not-for-production"
