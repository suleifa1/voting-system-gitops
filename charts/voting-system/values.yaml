# Default values for voting-system
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  namespace: voting-system
  imagePullSecrets:
    - name: gitlab-registry

# Backend configuration
backend:
  enabled: true
  name: backend
  replicaCount: 2
  
  image:
    repository: ghcr.io/suleifa1/backend
    tag: ""  # Must be overridden in values-dev/staging/prod.yaml
    pullPolicy: Always
  
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  livenessProbe:
    enabled: true
    path: /api/health
    initialDelaySeconds: 30
    periodSeconds: 10
  
  readinessProbe:
    enabled: true
    path: /api/health
    initialDelaySeconds: 10
    periodSeconds: 5
  
  env:
    PYTHONPATH: "/app"

# Frontend configuration
frontend:
  enabled: true
  name: frontend
  replicaCount: 2
  
  image:
    repository: ghcr.io/suleifa1/frontend
    tag: ""  # Must be overridden in values-dev/staging/prod.yaml
    pullPolicy: Always
  
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  livenessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 30
    periodSeconds: 10
  
  readinessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 5
  
  env:
    NODE_ENV: "production"
    NEXT_PUBLIC_API_URL: "/api"

# CockroachDB configuration
cockroachdb:
  enabled: true
  name: cockroachdb
  replicaCount: 1
  
  image:
    repository: cockroachdb/cockroach
    tag: v26.1.2
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    grpcPort: 26257
    httpPort: 8080
  
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  
  persistence:
    enabled: true
    size: 5Gi
    # storageClass: local-path  # Явно указываем StorageClass
    accessMode: ReadWriteOnce
  
  env:
    COCKROACH_CHANNEL: "kubernetes-insecure"
  
  database:
    name: poll_app
    user: root

# Istio Gateway + VirtualService configuration
istio:
  enabled: false  # Enable in environment-specific values
  hosts:
    - "voting.local"

# Ingress configuration (disabled when using Istio)
ingress:
  enabled: false
  className: "nginx"
  
  # NodePort service for Ingress Controller
  # Отключен по умолчанию, так как используется MetalLB LoadBalancer
  # Включить только если нет LoadBalancer (minikube, kind, etc.)
  nodePort:
    enabled: false
    httpPort: 30080
    httpsPort: 30443
  
  annotations: {}
    # nginx.ingress.kubernetes.io/rewrite-target: /$2
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  
  hosts:
    - host: voting.local
      paths:
        - path: /api
          pathType: Prefix
          backend: backend
        - path: /
          pathType: Prefix
          backend: frontend
  
  tls: []
  #  - secretName: voting-tls
  #    hosts:
  #      - voting.local

# Istio ServiceEntry - резолвит CockroachDB из namespace database
serviceEntry:
  database:
    enabled: false  # Enable in environment-specific values (not needed if cockroachdb.enabled=true)
    host: "database"           # имя хоста которое используют backend/migrate (DB_HOST)
    port: 26257
    address: cockroachdb.database.svc.cluster.local

# ConfigMap data
configMap:
  DB_HOST: "database"
  DB_PORT: "26257"
  DB_USER: "root"
  DB_NAME: "poll_app"
  COCKROACH_DATABASE: "poll_app"

# Secret data (base values - override in environment-specific files)
# WARNING: These are PLACEHOLDER values. Override with real secrets via:
# - Sealed Secrets (recommended for GitOps)
# - External Secrets Operator
# - Manual kubectl create secret
secret:
  SECRET_KEY: "PLACEHOLDER_OVERRIDE_THIS_VALUE"

# Init DB job (creates database before migrations)
initDbJob:
  enabled: true

# Migrate job
migrateJob:
  enabled: true
  image:
    repository: ghcr.io/suleifa1/backend
    # Tag inherited from backend.image.tag in environment-specific values
    tag: "dev-a0d8a28"  # Will be overridden by values-dev/staging/prod
    pullPolicy: Always
  restartPolicy: OnFailure
  backoffLimit: 3

# SealedSecret configuration (disabled by default, enable in environment-specific values)
sealedSecret:
  enabled: false
  encryptedSecretKey: ""
