{{- if and .Values.ingress.enabled .Values.ingress.nodePort.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ingress-nodeport
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ingress
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: {{ .Values.ingress.nodePort.httpPort }}
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    nodePort: {{ .Values.ingress.nodePort.httpsPort }}
    protocol: TCP
    name: https
  selector:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller
{{- end }}
