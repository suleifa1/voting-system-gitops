# Staging environment values
# Override default values for staging environment

global:
  namespace: staging

backend:
  replicaCount: 2
  
  image:
    tag: staging-f145ae6
    pullPolicy: Always
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

frontend:
  replicaCount: 2
  
  image:
    tag: staging-4db5e03
    pullPolicy: Always
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  env:
    NODE_ENV: "production"
    NEXT_PUBLIC_BASE_PATH: "/staging"

cockroachdb:
  replicaCount: 1
  
  persistence:
    size: 5Gi

ingress:
  enabled: false

istio:
  enabled: true
  hosts:
  - backend
  - frontend

# Staging secrets - USE SEALED SECRETS OR EXTERNAL SECRETS
secret:
  SECRET_KEY: "STAGING_PLACEHOLDER_USE_SEALED_SECRETS"
