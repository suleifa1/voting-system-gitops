# Staging environment values
# Override default values for staging environment

global:
  namespace: staging

backend:
  replicaCount: 2
  
  image:
    tag: staging-67b3a2c
    pullPolicy: Always
  
  resources:
    requests:
      memory: "100Mi"
      cpu: "50m"
    limits:
      memory: "200Mi"
      cpu: "50m"

frontend:
  replicaCount: 2
  
  image:
    tag: staging-67b3a2c
    pullPolicy: Always
  
  resources:
    requests:
      memory: "100Mi"
      cpu: "20m"
    limits:
      memory: "200Mi"
      cpu: "50m"

  livenessProbe:
    enabled: true
    path: /staging/
    initialDelaySeconds: 30
    periodSeconds: 10
  
  readinessProbe:
    enabled: true
    path: /staging/
    initialDelaySeconds: 10
    periodSeconds: 5
  
  env:
    NODE_ENV: "production"
    NEXT_PUBLIC_BASE_PATH: "/staging"

cockroachdb:
  replicaCount: 1

  resources:
    requests:
      memory: "512Mi"
      cpu: "50m"
    limits:
      memory: "800Mi"
      cpu: "50m"

  persistence:
    size: 5Gi

ingress:
  enabled: false

istio:
  enabled: true
  hosts:
  - backend
  - frontend

# Staging secrets - USE SEALED SECRETS OR EXTERNAL SECRETS
secret:
  SECRET_KEY: "STAGING_PLACEHOLDER_USE_SEALED_SECRETS"
