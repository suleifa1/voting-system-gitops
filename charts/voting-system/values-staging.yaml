# Staging environment values
# Override default values for staging environment

global:
  namespace: staging

backend:
  replicaCount: 2
  
  image:
    tag: staging-e22f203
    pullPolicy: Always
  
  resources:
    requests:
      memory: "100Mi"
      cpu: "150m"
    limits:
      memory: "200Mi"
      cpu: "150m"

frontend:
  replicaCount: 2
  
  image:
    tag: staging-bfd3b80
    pullPolicy: Always
  
  resources:
    requests:
      memory: "100Mi"
      cpu: "120m"
    limits:
      memory: "200Mi"
      cpu: "150m"

  livenessProbe:
    enabled: true
    path: /staging/
    initialDelaySeconds: 30
    periodSeconds: 10
  
  readinessProbe:
    enabled: true
    path: /staging/
    initialDelaySeconds: 10
    periodSeconds: 5
  
  env:
    NODE_ENV: "production"
    NEXT_PUBLIC_BASE_PATH: "/staging"

cockroachdb:
  enabled: false  # Moved to separate cockroachdb chart in namespace database

# Istio ServiceEntry - resolves CockroachDB from namespace database
serviceEntry:
  database:
    enabled: true
    host: "database"
    port: 26257
    address: cockroachdb.database.svc.cluster.local

# initDbJob and migrateJob moved to cockroachdb ArgoCD app
initDbJob:
  enabled: false

migrateJob:
  enabled: false

ingress:
  enabled: false

istio:
  enabled: true
  hosts:
  - backend
  - frontend

# Staging secrets - USE SEALED SECRETS OR EXTERNAL SECRETS
secret:
  SECRET_KEY: "STAGING_PLACEHOLDER_USE_SEALED_SECRETS"
  DB_USER: "app_staging"
