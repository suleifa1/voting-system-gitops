# GitLab CI/CD Pipeline for Voting System

stages:
  - debug
  - build
  - test
  - update-gitops
  - promote

variables:
  REGISTRY: gitlab.kiv.zcu.cz:5000
  BACKEND_IMAGE_NAME: voting-system-backend
  FRONTEND_IMAGE_NAME: voting-system-frontend
  BACKEND_DOCKERFILE: src/backend/Dockerfile
  FRONTEND_DOCKERFILE: src/frontend/Dockerfile

default:
  image: alpine:3.17
  tags:
    - kiv

# =====================================
# DEBUG: Check Docker Socket Access
# =====================================
debug-docker-socket:
  stage: debug
  image: alpine:3.17

  script:
    - echo "=== Checking Docker socket ==="
    - ls -la /var/run/docker.sock 2>&1 || echo "Socket not found in /var/run/"
    - echo ""
    - echo "=== Looking for docker socket anywhere ==="
    - find /var/run -name "*docker*" 2>/dev/null || echo "No docker sockets found"
    - echo ""
    - echo "=== Checking environment variables ==="
    - env | grep -i docker || echo "No docker env vars"
    - echo ""
    - echo "=== Trying to install and use docker-cli ==="
    - apk add --no-cache docker-cli
    - docker ps 2>&1 || echo "Docker daemon not accessible"

# =====================================
# DEBUG: Check Kaniko
# =====================================
debug-kaniko:
  stage: debug
  image: gcr.io/kaniko-project/executor:latest
  only:
    - main

  script:
    - echo "Kaniko test skipped - using DinD instead"

# =====================================
# JOB 1: Backend Tests
# =====================================
backend-test:
  stage: test
  image: alpine:3.17
  only:
    - dev
    - staging
    - main

  services:
    - postgres:15

  variables:
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_pass
    POSTGRES_DB: test_db
    POSTGRES_HOST_AUTH_METHOD: trust
    PYTHONUNBUFFERED: "1"

  before_script:
    - apk add --no-cache python3 py3-pip postgresql-client
    - cd src/backend
    - pip install --no-cache-dir -r requirements.txt pytest httpx

  script:
    - echo 'Running backend tests...'
    - pytest tests/ -v --tb=short
    - echo 'Backend tests passed!'

  artifacts:
    reports:
      junit: src/backend/pytest-report.xml
    paths:
      - src/backend/pytest-report.xml
    expire_in: 1 week
    when: always

  cache:
    paths:
      - .cache/pip
    key: $CI_COMMIT_REF_SLUG

# =====================================
# JOB 2: Frontend Tests
# =====================================
frontend-test:
  stage: test
  image: node:18-alpine
  only:
    - dev
    - staging
    - main

  before_script:
    - cd src/frontend
    - npm ci

  script:
    - echo 'Running frontend tests...'
    - npm run test:ci || true
    - echo 'Frontend tests completed!'

  allow_failure: true

# =====================================
# JOB 3: Build Backend Image
# =====================================
build-backend:
  stage: build
  image: docker:24-dind
  only:
    - dev
    - staging
    - main

  services:
    - docker:24-dind

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$REGISTRY"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="${CI_COMMIT_REF_NAME}-${SHORT_SHA}"
    - export FULL_IMAGE="${REGISTRY}/${CI_PROJECT_PATH_SLUG}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}"
    - echo "Building backend image: $FULL_IMAGE"
    - docker build -t "$FULL_IMAGE" -f "$BACKEND_DOCKERFILE" src/backend/
    - docker push "$FULL_IMAGE"
    - echo "Backend image built and pushed!"

  after_script:
    - docker logout "$REGISTRY" || true

# =====================================
# JOB 4: Build Frontend Image
# =====================================
build-frontend:
  stage: build
  image: docker:24-dind
  only:
    - dev
    - staging
    - main

  services:
    - docker:24-dind

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$REGISTRY"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="${CI_COMMIT_REF_NAME}-${SHORT_SHA}"
    - export FULL_IMAGE="${REGISTRY}/${CI_PROJECT_PATH_SLUG}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}"
    - echo "Building frontend image: $FULL_IMAGE"
    - docker build -t "$FULL_IMAGE" -f "$FRONTEND_DOCKERFILE" src/frontend/
    - docker push "$FULL_IMAGE"
    - echo "Frontend image built and pushed!"

  after_script:
    - docker logout "$REGISTRY" || true

# =====================================
# JOB 5: Update GitOps Repo (Dev)
# =====================================
update-gitops-dev:
  stage: update-gitops
  image: alpine:3.17
  only:
    - dev
  needs:
    - build-backend
    - build-frontend

  before_script:
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.local"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="dev-${SHORT_SHA}"
    - echo 'Image tag:' "$IMAGE_TAG"
    - echo 'Would update values-dev.yaml here'

# =====================================
# JOB 6: Update GitOps Repo (Staging)
# =====================================
update-gitops-staging:
  stage: update-gitops
  image: alpine:3.17
  only:
    - staging
  needs:
    - build-backend
    - build-frontend

  before_script:
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.local"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="staging-${SHORT_SHA}"
    - echo 'Image tag:' "$IMAGE_TAG"
    - echo 'Would update values-staging.yaml here'

# =====================================
# JOB 7: Auto-Promote Dev to Staging
# =====================================
promote-to-staging:
  stage: promote
  image: alpine:3.17
  only:
    - dev
  needs:
    - update-gitops-dev

  before_script:
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.local"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="dev-${SHORT_SHA}"
    - echo 'Would create merge request dev -> staging'
    - echo 'Image tag:' "$IMAGE_TAG"

  allow_failure: true

# =====================================
# JOB 8: Production Notification
# =====================================
prod-notification:
  stage: promote
  image: alpine:3.17
  only:
    - main
  needs:
    - build-backend
    - build-frontend

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export BACKEND_IMAGE="${REGISTRY}/${CI_PROJECT_PATH_SLUG}/${BACKEND_IMAGE_NAME}:main-${SHORT_SHA}"
    - export FRONTEND_IMAGE="${REGISTRY}/${CI_PROJECT_PATH_SLUG}/${FRONTEND_IMAGE_NAME}:main-${SHORT_SHA}"
    - echo '====================================='
    - echo 'Backend image built for PRODUCTION!'
    - echo 'Backend:' "$BACKEND_IMAGE"
    - echo 'Frontend:' "$FRONTEND_IMAGE"
    - echo 'Manual sync required in ArgoCD UI'
    - echo 'https://argocd.kiv.zcu.cz/applications'
    - echo '====================================='
