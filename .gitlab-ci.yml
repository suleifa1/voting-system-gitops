# GitLab CI/CD Pipeline for Voting System

stages:
  - test
  - build
  - update-gitops
  - promote

variables:
  REGISTRY: gitlab.kiv.zcu.cz:5000
  BACKEND_IMAGE_NAME: voting-system-backend
  FRONTEND_IMAGE_NAME: voting-system-frontend
  BACKEND_DOCKERFILE: src/backend/Dockerfile
  FRONTEND_DOCKERFILE: src/frontend/Dockerfile

default:
  tags:
    - kiv

# =====================================
# JOB 1: Backend Tests
# =====================================
backend-test:
  stage: test
  image: alpine:3.17
  only:
    - dev
    - staging
    - main

  services:
    - postgres:15

  variables:
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_pass
    POSTGRES_DB: test_db
    POSTGRES_HOST_AUTH_METHOD: trust
    PYTHONUNBUFFERED: "1"

  before_script:
    - apk add --no-cache python3 py3-pip postgresql-client
    - cd src/backend
    - pip install --no-cache-dir -r requirements.txt pytest httpx

  script:
    - echo 'Running backend tests...'
    - pytest tests/ -v --tb=short
    - echo 'Backend tests passed!'

  artifacts:
    reports:
      junit: src/backend/pytest-report.xml
    paths:
      - src/backend/pytest-report.xml
    expire_in: 1 week
    when: always

  cache:
    paths:
      - .cache/pip
    key: $CI_COMMIT_REF_SLUG

# =====================================
# JOB 2: Frontend Tests
# =====================================
frontend-test:
  stage: test
  image: node:18-alpine
  only:
    - dev
    - staging
    - main

  before_script:
    - cd src/frontend
    - npm ci

  script:
    - echo 'Running frontend tests...'
    - npm run test:ci || true
    - echo 'Frontend tests completed!'

  allow_failure: true

# =====================================
# JOB 3: Build Backend Image (Kaniko)
# =====================================
build-backend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.9.0-debug
    entrypoint: [""]
  only:
    changes:
      - src/backend/**/*
      - .gitlab-ci.yml
    refs:
      - dev
      - staging
      - main

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="${CI_COMMIT_REF_NAME}-${SHORT_SHA}"
    - export FULL_IMAGE="${REGISTRY}/${CI_PROJECT_PATH_SLUG}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}"
    - echo "Building backend image with Kaniko:" "$FULL_IMAGE"
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/src/backend"
      --dockerfile "${CI_PROJECT_DIR}/${BACKEND_DOCKERFILE}"
      --destination "${FULL_IMAGE}"
      --cache=true
      --cache-ttl=24h
      --snapshotMode=redo
      --use-new-run
      --compressed-caching=false
    - echo "Backend image built and pushed!"

# =====================================
# JOB 4: Build Frontend Image (Kaniko)
# =====================================
build-frontend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.9.0-debug
    entrypoint: [""]
  only:
    changes:
      - src/frontend/**/*
      - .gitlab-ci.yml
    refs:
      - dev
      - staging
      - main

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="${CI_COMMIT_REF_NAME}-${SHORT_SHA}"
    - export FULL_IMAGE="${REGISTRY}/${CI_PROJECT_PATH_SLUG}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}"
    - echo "Building frontend image with Kaniko:" "$FULL_IMAGE"
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/src/frontend"
      --dockerfile "${CI_PROJECT_DIR}/${FRONTEND_DOCKERFILE}"
      --destination "${FULL_IMAGE}"
      --cache=true
      --cache-ttl=24h
      --snapshotMode=redo
      --use-new-run
      --compressed-caching=false
    - echo "Frontend image built and pushed!"

# =====================================
# JOB 5: Update GitOps Repo - Backend (Dev)
# =====================================
update-gitops-dev-backend:
  stage: update-gitops
  image: alpine:3.17
  only:
    changes:
      - src/backend/**/*
      - .gitlab-ci.yml
    refs:
      - dev
  needs:
    - build-backend

  before_script:
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.local"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="dev-${SHORT_SHA}"
    - ./scripts/update-image-tag-dev.sh backend "$IMAGE_TAG"
    - git add charts/voting-system/values-dev.yaml
    - git commit -m "update backend image tag to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
    - git push https://oauth2:${GIT_TOKEN}@gitlab.kiv.zcu.cz/zaverecne-prace/voting-system-gitops.git HEAD:dev

# =====================================
# JOB 5b: Update GitOps Repo - Frontend (Dev)
# =====================================
update-gitops-dev-frontend:
  stage: update-gitops
  image: alpine:3.17
  only:
    changes:
      - src/frontend/**/*
      - .gitlab-ci.yml
    refs:
      - dev
  needs:
    - build-frontend

  before_script:
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.local"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="dev-${SHORT_SHA}"
    - ./scripts/update-image-tag-dev.sh frontend "$IMAGE_TAG"
    - git add charts/voting-system/values-dev.yaml
    - git commit -m "update frontend image tag to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
    - git push https://oauth2:${GIT_TOKEN}@gitlab.kiv.zcu.cz/zaverecne-prace/voting-system-gitops.git HEAD:dev

# =====================================
# JOB 6: Update GitOps Repo - Backend (Staging)
# =====================================
update-gitops-staging-backend:
  stage: update-gitops
  image: alpine:3.17
  only:
    changes:
      - src/backend/**/*
      - .gitlab-ci.yml
    refs:
      - staging
  needs:
    - build-backend

  before_script:
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.local"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="staging-${SHORT_SHA}"
    - ./scripts/update-image-tag-staging.sh backend "$IMAGE_TAG"
    - git add charts/voting-system/values-staging.yaml
    - git commit -m "update backend image tag to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
    - git push https://oauth2:${GIT_TOKEN}@gitlab.kiv.zcu.cz/zaverecne-prace/voting-system-gitops.git HEAD:staging

# =====================================
# JOB 6b: Update GitOps Repo - Frontend (Staging)
# =====================================
update-gitops-staging-frontend:
  stage: update-gitops
  image: alpine:3.17
  only:
    changes:
      - src/frontend/**/*
      - .gitlab-ci.yml
    refs:
      - staging
  needs:
    - build-frontend

  before_script:
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.local"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="staging-${SHORT_SHA}"
    - ./scripts/update-image-tag-staging.sh frontend "$IMAGE_TAG"
    - git add charts/voting-system/values-staging.yaml
    - git commit -m "update frontend image tag to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
    - git push https://oauth2:${GIT_TOKEN}@gitlab.kiv.zcu.cz/zaverecne-prace/voting-system-gitops.git HEAD:staging

# =====================================
# JOB 7: Auto-Promote Dev to Staging
# =====================================
promote-to-staging:
  stage: promote
  image: alpine:3.17
  only:
    - dev
  needs:
    - job: update-gitops-dev-backend
      optional: true
    - job: update-gitops-dev-frontend
      optional: true

  before_script:
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.local"

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export IMAGE_TAG="dev-${SHORT_SHA}"
    - echo 'Would create merge request dev -> staging'
    - echo 'Image tag:' "$IMAGE_TAG"

  allow_failure: true

# =====================================
# JOB 8: Production Notification
# =====================================
prod-notification:
  stage: promote
  image: alpine:3.17
  only:
    - main
  needs:
    - job: build-backend
      optional: true
    - job: build-frontend
      optional: true

  script:
    - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - export BACKEND_IMAGE="${REGISTRY}/${CI_PROJECT_PATH_SLUG}/${BACKEND_IMAGE_NAME}:main-${SHORT_SHA}"
    - export FRONTEND_IMAGE="${REGISTRY}/${CI_PROJECT_PATH_SLUG}/${FRONTEND_IMAGE_NAME}:main-${SHORT_SHA}"
    - echo '====================================='
    - echo 'Backend image built for PRODUCTION!'
    - echo 'Backend:' "$BACKEND_IMAGE"
    - echo 'Frontend:' "$FRONTEND_IMAGE"
    - echo 'Manual sync required in ArgoCD UI'
    - echo '====================================='
