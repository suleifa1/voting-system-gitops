apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  namespace: voting-system
spec:
  ttlSecondsAfterFinished: 100  # Удалить Job через 100 сек после завершения
  template:
    spec:
      restartPolicy: Never
      initContainers:
      # Создаем базу данных если не существует
      - name: create-database
        image: cockroachdb/cockroach:latest
        command:
          - /bin/sh
          - -c
          - |
            echo "Creating database if not exists..."
            ./cockroach sql --insecure --host=cockroachdb --execute="CREATE DATABASE IF NOT EXISTS poll_app;"
            echo "Database ready!"
      containers:
      - name: migrate
        image: ghcr.io/suleifa1/backend:latest
        command: ["alembic", "upgrade", "head"]
        envFrom:
        - configMapRef:
            name: voting-app-config
        - secretRef:
            name: voting-app-secrets
        env:
        - name: DB_HOST
          value: "cockroachdb"
