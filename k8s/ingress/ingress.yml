apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-system-ingress
  namespace: voting-system
  annotations:
    # Увеличиваем таймауты
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # CORS для разработки
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  rules:
  # Без хоста - работает с любым IP/доменом
  - http:
      paths:
      # Backend API - все запросы на /auth/*, /health, /docs и т.д.
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /openapi.json
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /surveys
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /polls
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      # Frontend - все остальные запросы (/, /dashboard, и т.д.)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
