apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-system-dev
  namespace: argocd
  labels:
    environment: dev
spec:
  project: default
  
  source:
    repoURL: https://github.com/suleifa1/voting-system-gitops
    targetRevision: dev  
    path: charts/voting-system
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  
  syncPolicy:
    automated:
      prune: true       
      selfHeal: true    
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
