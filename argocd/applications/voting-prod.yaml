apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-system-prod
  namespace: argocd
  labels:
    environment: prod
spec:
  project: default
  
  source:
    repoURL: https://github.com/suleifa1/voting-system-gitops
    targetRevision: main  
    path: charts/voting-system
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  
  # No sync policy - all operations manual only
  
  revisionHistoryLimit: 10
