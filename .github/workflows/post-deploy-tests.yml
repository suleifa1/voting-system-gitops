name: Post-Deploy Smoke Tests

on:
  push:
    branches: [dev]  # Только для dev! Staging = manual QA
    paths:
      - 'charts/voting-system/values-dev.yaml'

jobs:
  smoke-tests:
    name: Smoke Tests (Dev Only)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for ArgoCD to sync dev environment..."
          sleep 90
      
      - name: Make script executable
        run: chmod +x scripts/smoke-tests.sh
      
      - name: Run smoke tests
        run: ./scripts/smoke-tests.sh dev
