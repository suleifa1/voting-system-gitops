name: Backend CI/CD

on:
  push:
    branches: [dev, staging, main]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-cicd.yml'
  pull_request:
    branches: [dev, staging, main]
    paths:
      - 'src/backend/**'

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/backend

jobs:
  # =====================================
  # JOB 1: Tests (Unit + Integration)
  # =====================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: src/backend
        run: pip install -r requirements.txt
      
      - name: Run pytest
        working-directory: src/backend
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .
          SECRET_KEY: test-secret-key
          TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/backend/pytest-report.xml

  # =====================================
  # JOB 2: Build Docker Image
  # =====================================
  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image info
        run: |
          echo "Image: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  # =====================================
  # JOB 3: Update GitOps Repo (Dev)
  # =====================================
  update-gitops-dev:
    name: Update GitOps (Dev)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in values-dev.yaml
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="dev-${SHORT_SHA}"
          sed -i "s|tag: dev.*|tag: ${IMAGE_TAG}|g" charts/voting-system/values-dev.yaml
          
          cat charts/voting-system/values-dev.yaml | grep "tag:"
      
      - name: Commit and push changes
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add charts/voting-system/values-dev.yaml
          git commit -m "ci: update backend image tag to dev-${SHORT_SHA}" || echo "No changes to commit"
          git push origin dev

  # =====================================
  # JOB 4: E2E Tests (ПРОПУСКАЕМ для Dev - локальный кластер!)
  # =====================================
  # E2E тесты для dev нужно запускать локально: ./scripts/e2e-tests.sh dev
  # GitHub Actions не имеет доступа к локальному кластеру
  # Dev использует image tag "dev" который автоматически обновляется при build
  
  skip-e2e-dev:
    name: E2E Tests Skipped (Dev is local)
    needs: update-gitops-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    
    steps:
      - name: Skip E2E for local dev
        run: |
          echo "⚠️  E2E tests skipped for dev environment"
          echo "Dev cluster is local and not accessible from GitHub Actions"
          echo ""
          echo "📝 Strategy:"
          echo "1. Unit tests passed ✅ → Auto-promote to staging"
          echo "2. E2E tests will run on staging environment"
          echo "3. If staging OK → Manual promotion to prod"

  # =====================================
  # JOB 5: Auto-promote to Staging
  # =====================================
  promote-to-staging:
    name: Auto-Promote to Staging
    needs: [skip-e2e-dev, update-gitops-dev]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create PR to staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_TAG="dev-${{ github.sha }}"
          
          # Create PR using GitHub CLI
          gh pr create \
            --base staging \
            --head dev \
            --title "🚀 Auto-promote: dev → staging (${IMAGE_TAG})" \
            --body "## Automatic Promotion to Staging

          **Source:** dev branch
          **Commit:** ${{ github.sha }}
          **Image Tag:** \`${IMAGE_TAG}\`
          
          ### Changes:
          - ✅ Unit tests passed
          - ✅ Docker image built and pushed
          - ✅ Dev environment updated
          
          ### Next Steps:
          1. Review changes
          2. Merge this PR to deploy to staging
          3. Run E2E tests on staging: \`./scripts/e2e-tests.sh staging\`
          4. If staging OK → promote to production
          
          **Auto-generated by GitHub Actions**" || echo "PR already exists or error occurred"

  # =====================================
  # NOTE: E2E tests run on STAGING, not dev
  # =====================================

  # =====================================
  # JOB 6: Production Notification
  # =====================================
  prod-notification:
    name: Prod Deployment Notification
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Notify
        run: |
          echo "🚀 Backend image built for PRODUCTION!"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "⚠️  Manual sync required in ArgoCD UI"
