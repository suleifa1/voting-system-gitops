name: Frontend CI/CD

on:
  push:
    branches: [dev, staging, main]
    paths:
      - 'src/frontend/**'
      - '.github/workflows/frontend-cicd.yml'
  pull_request:
    branches: [dev, staging, main]
    paths:
      - 'src/frontend/**'
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/frontend

jobs:
  # =====================================
  # JOB 1: Tests (Unit + E2E)
  # =====================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci
      
      - name: Run linter
        working-directory: src/frontend
        run: npm run lint || echo "Linting skipped"
      
      - name: Run tests
        working-directory: src/frontend
        run: npm run test || echo "Tests skipped - add tests later"
      
      - name: Build check
        working-directory: src/frontend
        run: npm run build

  # =====================================
  # JOB 2: Build Docker Image
  # =====================================
  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image info
        run: |
          echo "Image: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  # =====================================
  # JOB 3: Update GitOps Repo (Dev)
  # =====================================
  update-gitops-dev:
    name: Update GitOps (Dev)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in values-dev.yaml
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="dev-${SHORT_SHA}"
          # Update only frontend tag, leave backend as is
          sed -i "/^frontend:/,/^cockroachdb:/ s|tag: dev.*|tag: ${IMAGE_TAG}|" charts/voting-system/values-dev.yaml
          
          echo "Updated frontend tag to: $IMAGE_TAG"
          cat charts/voting-system/values-dev.yaml | grep -A 5 "^frontend:"
      
      - name: Commit and push changes
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add charts/voting-system/values-dev.yaml
          git commit -m "ci: update frontend image tag to dev-${SHORT_SHA} [skip ci]" || echo "No changes to commit"
          git push origin dev

  # =====================================
  # JOB 4: Update GitOps Repo (Staging)
  # =====================================
  update-gitops-staging:
    name: Update GitOps (Staging)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: staging
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in values-staging.yaml
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="staging-${SHORT_SHA}"
          # Update only frontend tag, leave backend as is
          sed -i "/^frontend:/,/^cockroachdb:/ s|tag: staging.*|tag: ${IMAGE_TAG}|" charts/voting-system/values-staging.yaml
          
          echo "Updated frontend tag to: $IMAGE_TAG"
          cat charts/voting-system/values-staging.yaml | grep -A 5 "^frontend:"
      
      - name: Commit and push changes
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add charts/voting-system/values-staging.yaml
          git commit -m "ci: update frontend image tag to staging-${SHORT_SHA} [skip ci]" || echo "No changes to commit"
          git push origin staging

  # =====================================
  # JOB 5: Production Notification
  # =====================================
  prod-notification:
    name: Prod Deployment Notification
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Notify
        run: |
          echo "🚀 Frontend image built for PRODUCTION!"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "⚠️  Manual sync required in ArgoCD UI"
          echo "📝 Use semver tags for production releases (v1.0.0)"
