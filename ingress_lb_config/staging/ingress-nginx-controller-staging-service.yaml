apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller-staging
  namespace: ingress-nginx
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.88.99.103"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: https
      port: 443
      targetPort: https
  selector:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/instance: ingress-nginx-staging